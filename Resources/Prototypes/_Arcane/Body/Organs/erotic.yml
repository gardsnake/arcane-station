- type: entity
  id: BaseEroticOrgan
  parent: BaseItem
  abstract: true
  components:
  - type: Organ
    canEnable: true
    removable: false

# Universal (all sexes)
# Internal muscle — no integrity display in health scanner.
- type: entity
  id: OrganAnus
  parent: BaseEroticOrgan
  name: anus
  description: An internal sphincter muscle.
  components:
  - type: Organ
    slotId: anus
    removable: false
  - type: EroticOrgan
    sensitivity: 1.2
  - type: AnusOrgan

# Male / Futanari
# External organ — shows in health scanner.
- type: entity
  id: OrganPenis
  parent: BaseEroticOrgan
  name: penis
  description: A male genital organ.
  components:
  - type: Organ
    intCap: 15
    integrity: 15
    integrityThresholds:
      Normal: 15
      Damaged: 6
      Destroyed: 0
    slotId: penis
    removable: false
  - type: EroticOrgan
    sensitivity: 1.5
  - type: PenisOrgan

# Internal gonads — no integrity display in health scanner.
- type: entity
  id: OrganTesticles
  parent: BaseEroticOrgan
  name: testicles
  description: Male gonads.
  components:
  - type: Organ
    slotId: testicles
    removable: false
  - type: EroticOrgan
    sensitivity: 1.0
  - type: TesticlesOrgan

# Female / Futanari
# Mostly internal — no integrity display in health scanner.
- type: entity
  id: OrganVagina
  parent: BaseEroticOrgan
  name: vagina
  description: A female genital organ.
  components:
  - type: Organ
    slotId: vagina
    removable: false
  - type: EroticOrgan
    sensitivity: 1.5
  - type: VaginaOrgan

# Deeply internal — no integrity display in health scanner.
