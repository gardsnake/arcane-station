  components:
  - type: HumanoidAppearance
    species: Demon
    hideLayersOnEquip:
    - HeadSide
  - type: Hunger
  - type: Thirst
    dehydrationDamage:
      types:
        Bloodloss: 0.5
        Asphyxiation: 0.5
  - type: Icon
    sprite: _Arcane/Mobs/Species/Demon/parts.rsi
    state: full_m
  - type: Body
    prototype: Demon
  - type: Butcherable
    butcheringType: Spike
    spawned:
